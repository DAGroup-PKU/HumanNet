<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f7f6" />
    <meta
      name="description"
      content="HumanNet — a comprehensive, open, human-centric video dataset (967k hours) for training, evaluating, and advancing embodied AI models."
    />
    <!-- Favicon set generated from src/assets/logo.png (PKU DAGroup seal).
         .ico is the legacy / Windows fallback (multi-size 16/32/48); the
         16x16 and 32x32 PNGs are what evergreen browsers use; the 180x180
         variant is iOS home-screen / "Add to Home Screen". -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <title>HumanNet — Scaling Human-Centric Video Learning to One Million Hours</title>
    <script>
      (() => {
        const theme = "light";
        try {
          localStorage.setItem("humannet-theme", theme);
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(theme);
          document.documentElement.dataset.theme = theme;
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute("content", "#f5f7f6");
        } catch {
          // Keep the static light theme if browser storage is unavailable.
        }
      })();
    </script>
  </head>
  <body class="bg-nebula-base text-nebula-on antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
